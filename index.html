<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FAVES Jewelry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: Arial, sans-serif;
}

/* HERO SECTION */
.hero {
  position:relative;
  height:100vh;
  width:100%;
  overflow:hidden;
  background:black;
}

/* VIDEO */
.hero video {
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  transform:translate(-50%, -50%);
  object-fit:cover;
}

/* OVERLAY */
.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  padding:20px;
}

/* TEXT */
h1 {
  font-size:40px;
  letter-spacing:2px;
  margin-bottom:10px;
}

p {
  font-size:16px;
  margin-bottom:30px;
}

/* BUTTON */
.btn {
  padding:12px 28px;
  margin:8px;
  border:1px solid white;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:white;
  color:black;
}

/* MOBILE */
@media(max-width:768px){
  h1 { font-size:28px; }
}
</style>
</head>

<body>

<div class="hero">
  <video autoplay muted loop playsinline>
    <source src="banner.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>FAVES</h1>
    <p>Minimal. Waterproof. Made to last.</p>

    <a class="btn" href="https://myEdzy.com">Shop Now</a>
    <a class="btn" href="https://instagram.com/myEdzy">Instagram</a>
  </div>
</div>

</body>
</html>
